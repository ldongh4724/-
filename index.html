<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Future Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- 구글 폰트 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ticker-bar">
        <div class="ticker-item">BTC <span id="btcPrice">-</span></div>
        <div class="ticker-item">ETH <span id="ethPrice">-</span></div>
        <div class="status-live">● SYSTEM ACTIVE</div>
    </div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">TERMINAL</div>
            <ul class="nav-menu">
                <li onclick="showSection('menuSection')" class="active" id="nav-menuSection">🏠 DASHBOARD</li>
                <li onclick="showSection('inputSection')" id="nav-inputSection">✍️ NEW TRADE</li>
                <li onclick="showSection('statsSection')" id="nav-statsSection">📊 AI ANALYSIS</li>
            </ul>
        </nav>

        <main class="main-content">
            <!-- DASHBOARD -->
            <section id="menuSection" class="content-section">
                <div class="section-header">
                    <h2>OVERVIEW</h2>
                </div>
                <div class="summary-cards" id="homeSummary"></div>
                <h3>RECENT TRADES</h3>
                <div id="recentLogs" class="log-grid"></div>
            </section>

            <!-- INPUT -->
            <section id="inputSection" class="content-section" style="display:none;">
                <div class="section-header"><h2>NEW ENTRY</h2></div>
                <div class="glass-card">
                    <div class="pos-toggle">
                        <button id="longBtn" class="active" onclick="setPos('LONG')">LONG</button>
                        <button id="shortBtn" onclick="setPos('SHORT')">SHORT</button>
                    </div>
                    <input type="text" id="stockName" placeholder="SYMBOL (e.g. BTCUSDT)">
                    <div class="input-row">
                        <input type="number" id="leverage" placeholder="LEVERAGE">
                        <input type="number" id="buyPrice" placeholder="ENTRY">
                        <input type="number" id="sellPrice" placeholder="EXIT">
                    </div>
                    <textarea id="memo" placeholder="STRATEGY & NOTES"></textarea>
                    <div class="upload-box">
                        <input type="file" id="imageInput" accept="image/*">
                    </div>
                    <button class="neon-btn" onclick="addLog()">EXECUTE SAVE</button>
                </div>
            </section>

            <!-- STATS -->
            <section id="statsSection" class="content-section" style="display:none;">
                <div class="section-header"><h2>AI DIAGNOSTICS</h2></div>
                <div id="aiAnalysis" class="analysis-grid"></div>
                
                <h3 style="margin-top:40px;">HISTORY FILTER</h3>
                <div class="filter-bar">
                    <input type="date" id="startDate">
                    <span>~</span>
                    <input type="date" id="endDate">
                    <button onclick="filterLogs()">SEARCH</button>
                </div>
                <div id="filteredLogs" class="log-grid"></div>
            </section>
        </main>
    </div>

    <!-- 수정용 모달 (Modal) -->
    <div id="editModal" class="modal">
        <div class="modal-content glass-card">
            <h3>EDIT TRADE</h3>
            <div id="editForm"></div>
            <div class="modal-btns">
                <button class="save-btn" onclick="submitEdit()">SAVE</button>
                <button class="cancel-btn" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

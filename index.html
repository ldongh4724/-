<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Future Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 상단 실시간 시세 바 -->
    <div class="ticker-bar">
        <span>BTC/USDT: <span id="btcPrice" class="loading">Loading...</span></span>
        <span>ETH/USDT: <span id="ethPrice" class="loading">Loading...</span></span>
        <span class="status-dot">● Live</span>
    </div>

    <div class="app-container">
        <!-- 사이드바 -->
        <nav class="sidebar">
            <div class="logo">📈 TradeLog Pro</div>
            <ul class="nav-menu">
                <li onclick="showSection('menuSection')" class="active" id="nav-menuSection">🏠 메뉴 (홈)</li>
                <li onclick="showSection('inputSection')" id="nav-inputSection">✍️ 매매일지 작성</li>
                <li onclick="showSection('statsSection')" id="nav-statsSection">📊 AI 수익 분석</li>
            </ul>
        </nav>

        <!-- 메인 컨텐츠 -->
        <main class="main-content">
            <!-- 섹션 1: 홈 대시보드 -->
            <section id="menuSection" class="content-section">
                <h2>대시보드 요약</h2>
                <div class="summary-cards" id="homeSummary"></div>
                <h3>최근 매매 내역</h3>
                <div id="recentLogs" class="log-list"></div>
            </section>

            <!-- 섹션 2: 매매일지 작성 -->
            <section id="inputSection" class="content-section" style="display:none;">
                <h2>새 매매 기록</h2>
                <div class="input-form">
                    <div class="pos-toggle">
                        <button id="longBtn" class="active" onclick="setPos('LONG')">LONG</button>
                        <button id="shortBtn" onclick="setPos('SHORT')">SHORT</button>
                    </div>
                    <input type="text" id="stockName" placeholder="종목 (예: BTCUSDT)">
                    <div class="input-row">
                        <input type="number" id="leverage" placeholder="레버리지">
                        <input type="number" id="buyPrice" placeholder="진입가">
                        <input type="number" id="sellPrice" placeholder="종료가">
                    </div>
                    <textarea id="memo" placeholder="매매 전략 및 복기"></textarea>
                    <input type="file" id="imageInput" accept="image/*">
                    <button class="primary-btn" onclick="addLog()">기록 저장</button>
                </div>
            </section>

            <!-- 섹션 3: AI 수익 분석 -->
            <section id="statsSection" class="content-section" style="display:none;">
                <h2>📊 AI 매매 패턴 분석</h2>
                <div id="aiAnalysis" class="analysis-grid"></div>

                <h2 style="margin-top:40px;">📅 기간별 상세 조회</h2>
                <div class="filter-bar">
                    <input type="date" id="startDate"> ~ <input type="date" id="endDate">
                    <button onclick="filterLogs()" class="filter-btn">조회</button>
                </div>
                <div id="filteredStats"></div>
                <div id="filteredLogs" class="log-list"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

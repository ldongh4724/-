<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Terminal Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="sidebar-open ticker-open">

    <!-- 로그인 오버레이 -->
    <div id="loginOverlay" class="login-overlay">
        <div class="glass-input-box">
            <div class="section-title">TERMINAL_ACCESS</div>
            <input type="text" id="userName" placeholder="OPERATOR NAME">
            <input type="number" id="initialSeed" placeholder="INITIAL CAPITAL (USDT)">
            <button class="neon-save-btn" onclick="handleLogin()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <!-- 하단 시세 바 -->
    <div class="ticker-wrapper" id="tickerWrapper">
        <button class="ticker-toggle-btn" onclick="toggleTicker()">
            <span id="tickerToggleIcon">▼</span> TICKER
        </button>
        <div class="ticker-bar" id="tickerBar">
            <div class="ticker-content">
                <div class="ticker-item">BTC <span id="btcPrice">-</span> <small id="btcChange">-</small></div>
                <div class="ticker-item">ETH <span id="ethPrice">-</span> <small id="ethChange">-</small></div>
                <div class="ticker-item">SOL <span id="solPrice">-</span> <small id="solChange">-</small></div>
                <div class="ticker-item">XRP <span id="xrpPrice">-</span> <small id="xrpChange">-</small></div>
            </div>
            <div class="status-live" id="userDisplay">● SYSTEM ACTIVE</div>
        </div>
    </div>

    <button class="sidebar-toggle" onclick="toggleSidebar()">
        <span id="toggleIcon">◀</span>
    </button>

    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header" id="terminalBrand">TERMINAL_v1.0</div>
            <ul class="nav-menu">
                <li onclick="showSection('menuSection')" class="active" id="nav-menuSection">🏠 DASHBOARD</li>
                <li onclick="showSection('inputSection')" id="nav-inputSection">✍️ NEW ENTRY</li>
                <li onclick="showSection('statsSection')" id="nav-statsSection">📊 DIAGNOSTICS</li>
                <li onclick="logout()" style="color: #ff3366; margin-top: 20px;">🔓 LOGOUT</li>
            </ul>
        </nav>

        <main class="main-content">
            <!-- DASHBOARD -->
            <section id="menuSection" class="content-section">
                <div class="section-title">EQUITY_OVERVIEW</div>
                <div class="analysis-grid" id="equityStats"></div>

                <div class="section-title">PERIODIC_PERFORMANCE</div>
                <div class="analysis-grid" id="periodStats"></div>

                <div class="section-title">RECENT_LOGS</div>
                <div id="recentLogs" class="log-grid"></div>
            </section>

            <!-- INPUT (투자금 입력 추가) -->
            <section id="inputSection" class="content-section center-layout" style="display:none;">
                <div class="glass-input-box">
                    <div class="section-title">EXECUTE_NEW_TRADE</div>
                    <div class="pos-toggle">
                        <button id="longBtn" class="active" onclick="setPos('LONG')">LONG</button>
                        <button id="shortBtn" onclick="setPos('SHORT')">SHORT</button>
                    </div>
                    <input type="text" id="stockName" placeholder="SYMBOL">
                    <div class="input-row" style="display: flex; gap: 10px;">
                        <input type="number" id="tradeSize" placeholder="MARGIN (USDT)">
                        <input type="number" id="leverage" placeholder="LEV">
                    </div>
                    <div class="input-row" style="display: flex; gap: 10px;">
                        <input type="number" id="buyPrice" placeholder="ENTRY">
                        <input type="number" id="sellPrice" placeholder="EXIT">
                    </div>
                    <textarea id="memo" placeholder="STRATEGY NOTES..."></textarea>
                    <button class="neon-save-btn" onclick="addLog()">CONFIRM SAVE</button>
                </div>
            </section>

            <!-- STATS -->
            <section id="statsSection" class="content-section" style="display:none;">
                <div class="section-title">CUSTOM_PERIOD_ANALYSIS</div>
                <div class="filter-area">
                    <input type="date" id="startDate"> <span>~</span> <input type="date" id="endDate">
                    <button onclick="filterLogs()">QUERY</button>
                </div>
                <div id="queryAnalysis" class="analysis-grid" style="margin-top:20px;"></div>
                <div id="filteredLogs" class="log-grid"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
